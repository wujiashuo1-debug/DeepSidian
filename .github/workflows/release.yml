name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install plugin dependencies
        run: npm ci

      - name: Install fetch-proxy dependencies
        run: npm --prefix fetch-proxy ci

      - name: Run checks
        run: npm run check

      - name: Package Obsidian plugin
        run: |
          mkdir -p release
          cp main.js manifest.json styles.css release/
          cd release
          zip -r ../deepsidian.zip main.js manifest.json styles.css

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepsidian
          path: deepsidian.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: deepsidian.zip
